<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Football Rotation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

  <div class="phone-wrap">
    <div class="phone">

      <!-- ambient blobs -->
      <div class="blob blob-1" aria-hidden="true"></div>
      <div class="blob blob-2" aria-hidden="true"></div>

      <!-- ===== VIEW: SETUP ===== -->
      <section id="view-setup" class="view active">
        <div class="status-bar">
          <span class="time">9:41</span>
          <div class="status-icons" aria-hidden="true">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1" opacity=".4"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="1" width="2" height="10" rx="1" opacity=".4"/></svg>
            <svg width="16" height="12" viewBox="0 0 24 12" fill="currentColor"><rect x="0" y="0" width="22" height="12" rx="3" opacity=".35"/><rect x="22.5" y="3.5" width="1.5" height="5" rx=".75"/><rect x="1" y="1" width="18" height="10" rx="2"/></svg>
          </div>
        </div>

        <div class="phone-body">
          <div class="scroll-area" id="setup-scroll">

            <div class="app-header">
              <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                  <circle cx="16" cy="16" r="15" stroke="#16C784" stroke-width="2"/>
                  <path d="M16 4c6.627 0 12 5.373 12 12S22.627 28 16 28 4 22.627 4 16 9.373 4 16 4z" fill="#16C784" opacity=".12"/>
                  <path d="M10 13l6-4 6 4-2.3 7H12.3L10 13z" fill="#16C784" stroke="#16C784" stroke-width="1.2" stroke-linejoin="round"/>
                  <circle cx="16" cy="9" r="1.5" fill="#fff"/>
                  <circle cx="10" cy="13" r="1.5" fill="#fff"/>
                  <circle cx="22" cy="13" r="1.5" fill="#fff"/>
                  <circle cx="12.3" cy="20" r="1.5" fill="#fff"/>
                  <circle cx="19.7" cy="20" r="1.5" fill="#fff"/>
                </svg>
              </div>
              <div class="app-header-text">
                <h1 class="app-title">Football<br>Rotation</h1>
                <p class="app-sub">Fair rotation · Zero arguments</p>
              </div>
            </div>

            <!-- Field size -->
            <div class="section">
              <label class="section-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                Players per side <span class="label-hint">incl. GK</span>
              </label>
              <div class="stepper-wrap">
                <button class="stepper-btn" id="field-dec" aria-label="Decrease">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <div class="stepper-display">
                  <span class="stepper-val" id="field-val">8</span>
                  <span class="stepper-unit">players</span>
                </div>
                <button class="stepper-btn" id="field-inc" aria-label="Increase">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
              </div>
            </div>

            <!-- Add players -->
            <div class="section">
              <label class="section-label" for="player-input">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Players <span id="player-count-badge" class="count-badge" style="display:none"></span>
              </label>
              <div class="player-input-row">
                <input
                  type="text"
                  id="player-input"
                  class="player-input"
                  placeholder="Enter name and press Add…"
                  maxlength="20"
                  autocomplete="off"
                  autocorrect="off"
                  spellcheck="false"
                >
                <button class="add-btn" id="add-player-btn">Add</button>
              </div>
              <div class="chip-list" id="player-chips"></div>
              <p class="player-hint" id="player-count-label"></p>
            </div>

            <!-- Saved groups -->
            <div class="section">
              <label class="section-label">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Saved Groups
              </label>
              <div class="groups-list" id="groups-list">
                <p class="empty-hint" id="groups-empty">No saved groups yet</p>
              </div>
            </div>

          </div>
        </div>

        <div class="bottom-bar">
          <p class="error-msg" id="setup-error" role="alert"></p>
          <div class="btn-row">
            <button class="btn-secondary" id="save-group-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
              Save
            </button>
            <button class="btn-primary" id="generate-btn">
              Generate
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- ===== VIEW: SCHEDULE ===== -->
      <section id="view-schedule" class="view">
        <div class="status-bar">
          <span class="time">9:41</span>
          <div class="status-icons" aria-hidden="true">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1" opacity=".4"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="1" width="2" height="10" rx="1" opacity=".4"/></svg>
            <svg width="16" height="12" viewBox="0 0 24 12" fill="currentColor"><rect x="0" y="0" width="22" height="12" rx="3" opacity=".35"/><rect x="22.5" y="3.5" width="1.5" height="5" rx=".75"/><rect x="1" y="1" width="18" height="10" rx="2"/></svg>
          </div>
        </div>

        <div class="sched-topbar">
          <button class="icon-btn" id="back-btn" aria-label="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
          </button>
          <div class="sched-title-block">
            <h2 class="sched-title" id="sched-title">Schedule</h2>
            <p class="sched-meta" id="sched-meta"></p>
          </div>
          <button class="icon-btn" id="reshuffle-btn" aria-label="Re-shuffle">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
        </div>

        <div class="fairness-strip" id="fairness-strip"></div>

        <div class="phone-body">
          <div class="scroll-area" id="sched-scroll">
            <div class="rounds-list" id="rounds-list"></div>
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn-primary btn-full" id="copy-btn">
            <svg id="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <svg id="copy-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20,6 9,17 4,12"/></svg>
            <span id="copy-label">Copy Schedule</span>
          </button>
        </div>
      </section>

    </div>
  </div>

  <!-- GK Swap Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Swap goalkeeper">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">Swap Goalkeeper with…</p>
      <ul class="modal-list" id="modal-list"></ul>
      <button class="btn-secondary modal-cancel-btn" id="modal-cancel">Cancel</button>
    </div>
  </div>

  <!-- Save Group Modal -->
  <div class="modal-overlay" id="save-modal-overlay" role="dialog" aria-modal="true" aria-label="Save group">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">Save Group As</p>
      <input type="text" id="group-name-input" class="player-input" placeholder="e.g. Tuesday Gang" maxlength="30" autocomplete="off">
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-secondary" id="save-modal-cancel">Cancel</button>
        <button class="btn-primary" id="save-modal-confirm">Save Group</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
